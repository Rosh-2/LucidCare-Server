name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Replace 'YOUR_HF_USERNAME' and 'YOUR_SPACE_NAME' below with your actual Hugging Face credentials
          git push --force https://Rosh-2:$HF_TOKEN@huggingface.co/spaces/Rosh-2/lucid-care-backend main
